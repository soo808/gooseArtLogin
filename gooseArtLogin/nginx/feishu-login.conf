# GooseArt 飞书登录 - Nginx 反向代理配置
# 将此文件内容添加到你服务器上 1.14.107.50 对应的 nginx server 块中
#
# 用法：
#   1. 复制此文件到 /etc/nginx/conf.d/ 或合并到已有的 server 配置中
#   2. nginx -t && nginx -s reload
#
# 假设你服务器上已有的 nginx 配置类似：
#   server {
#       listen 80;
#       server_name 1.14.107.50;
#       # ... 现有的 GooseArt AI 工作台配置 ...
#   }
#
# 在该 server 块中添加以下 location 块：

# ========== 开始：添加到现有 server 块中 ==========

# 飞书登录相关 API - 代理到 Node.js 服务 (端口 3001)
location /api/auth/feishu/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/feishu/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/auth/me {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 飞书登录页面（可选 - 如果你想把 /feishu-login 作为独立入口）
location /feishu-login {
    proxy_pass http://127.0.0.1:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 健康检查
location /health {
    proxy_pass http://127.0.0.1:3001;
}

# ========== 结束 ==========
