<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GooseArt - 飞书登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c-bg: #0e0f14;
      --c-surface: #16171e;
      --c-card: #1c1d27;
      --c-border: rgba(255,255,255,.06);
      --c-text: #e8e6e1;
      --c-text-dim: #8a8990;
      --c-accent: #f0c040;
      --c-accent-glow: rgba(240,192,64,.25);
      --c-success: #4ecb71;
      --c-error: #f05050;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius: 16px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--c-bg);
      color: var(--c-text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* --- ambient background --- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(240,192,64,.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(100,80,220,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .grain {
      position: fixed;
      inset: 0;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 1;
    }

    /* --- main container --- */
    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .8s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* --- logo area --- */
    .logo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--c-accent) 0%, #e6a820 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px var(--c-accent-glow);
      margin-bottom: 28px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px var(--c-accent-glow); }
      50%      { box-shadow: 0 12px 48px rgba(240,192,64,.35); }
    }

    .logo-wrap svg {
      width: 48px;
      height: 48px;
    }

    .brand {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--c-text);
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: var(--c-text-dim);
      margin-bottom: 40px;
      letter-spacing: .04em;
    }

    /* --- card --- */
    .card {
      width: 100%;
      background: var(--c-card);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 32px 28px;
      backdrop-filter: blur(20px);
    }

    .card-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--c-text-dim);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* --- button --- */
    .btn-feishu {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--c-accent) 0%, #e6a820 100%);
      color: #1a1a1a;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform .15s, box-shadow .25s;
      position: relative;
      overflow: hidden;
    }

    .btn-feishu:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--c-accent-glow);
    }

    .btn-feishu:active {
      transform: scale(.98);
    }

    .btn-feishu:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-feishu .icon {
      width: 22px;
      height: 22px;
    }

    /* --- spinner --- */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(0,0,0,.15);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- status messages --- */
    .status {
      width: 100%;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
      animation: fadeUp .35s ease-out;
    }

    .status.show { display: block; }

    .status.info {
      background: rgba(240,192,64,.08);
      border: 1px solid rgba(240,192,64,.15);
      color: var(--c-accent);
    }

    .status.success {
      background: rgba(78,203,113,.08);
      border: 1px solid rgba(78,203,113,.15);
      color: var(--c-success);
    }

    .status.error {
      background: rgba(240,80,80,.08);
      border: 1px solid rgba(240,80,80,.15);
      color: var(--c-error);
    }

    /* --- user card (after login) --- */
    .user-card {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 24px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      animation: fadeUp .5s ease-out;
    }

    .user-card.show { display: block; }

    .user-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .user-avatar {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: cover;
      background: var(--c-card);
      border: 2px solid var(--c-accent);
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
    }

    .user-id {
      font-size: 12px;
      color: var(--c-text-dim);
      margin-top: 2px;
      font-family: monospace;
    }

    .user-fields {
      display: grid;
      gap: 12px;
    }

    .field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--c-card);
      border-radius: 10px;
      font-size: 13px;
    }

    .field-label { color: var(--c-text-dim); }
    .field-value { color: var(--c-text); font-weight: 500; }

    /* --- footer --- */
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--c-text-dim);
      opacity: .6;
      text-align: center;
    }

    /* --- responsive --- */
    @media (max-height: 700px) {
      .container { padding: 16px; }
      .logo-wrap { width: 64px; height: 64px; margin-bottom: 20px; }
      .logo-wrap svg { width: 36px; height: 36px; }
      .brand { font-size: 24px; }
      .tagline { margin-bottom: 24px; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <div class="container">
    <div class="logo-wrap">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 6C18 6 14 10 14 16C14 18 15 20 16 21C12 23 10 27 10 32C10 38 14 42 20 42H28C34 42 38 38 38 32C38 27 36 23 32 21C33 20 34 18 34 16C34 10 30 6 24 6Z" fill="#1a1a1a" fill-opacity=".85"/>
        <circle cx="19" cy="18" r="2.5" fill="#fff"/>
        <circle cx="29" cy="18" r="2.5" fill="#fff"/>
        <path d="M20 26C20 26 22 29 24 29C26 29 28 26 28 26" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="brand">GooseArt</div>
    <p class="tagline">创意协作 · 飞书登录</p>

    <div class="card">
      <div class="card-title">飞书账号登录</div>
      <p class="card-desc">在飞书客户端内打开此页面，即可一键免登录。无需输入密码，安全便捷。</p>
      <button class="btn-feishu" id="loginBtn" onclick="handleLogin()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 5.5L10.5 12L4 18.5H7.5L14 12L7.5 5.5H4Z" fill="#1a1a1a"/>
          <path d="M10 5.5L16.5 12L10 18.5H13.5L20 12L13.5 5.5H10Z" fill="#1a1a1a" fill-opacity=".5"/>
        </svg>
        <span id="btnText">飞书一键登录</span>
      </button>
    </div>

    <div class="status" id="statusBox"></div>

    <div class="user-card" id="userCard">
      <div class="user-header">
        <img class="user-avatar" id="userAvatar" src="" alt="avatar" />
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-id" id="userOpenId"></div>
        </div>
      </div>
      <div class="user-fields">
        <div class="field">
          <span class="field-label">邮箱</span>
          <span class="field-value" id="userEmail">-</span>
        </div>
        <div class="field">
          <span class="field-label">手机</span>
          <span class="field-value" id="userMobile">-</span>
        </div>
      </div>
    </div>

    <div class="footer">Powered by Feishu Open Platform</div>
  </div>

  <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.30.js"></script>
  <script>
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const statusBox = document.getElementById('statusBox');
    const userCard = document.getElementById('userCard');

    function showStatus(type, msg) {
      statusBox.className = 'status show ' + type;
      statusBox.textContent = msg;
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      btnText.textContent = loading ? '登录中…' : '飞书一键登录';
      if (loading) {
        const spinner = document.createElement('div');
        spinner.className = 'spinner';
        spinner.id = 'loadingSpinner';
        loginBtn.prepend(spinner);
        loginBtn.querySelector('.icon').style.display = 'none';
      } else {
        const s = document.getElementById('loadingSpinner');
        if (s) s.remove();
        loginBtn.querySelector('.icon').style.display = '';
      }
    }

    function showUser(user) {
      document.getElementById('userName').textContent = user.name || '飞书用户';
      document.getElementById('userOpenId').textContent = user.open_id || '';
      document.getElementById('userAvatar').src = user.avatar_url || '';
      document.getElementById('userEmail').textContent = user.email || '-';
      document.getElementById('userMobile').textContent = user.mobile || '-';
      userCard.classList.add('show');
    }

    function isInFeishu() {
      const ua = navigator.userAgent.toLowerCase();
      return ua.includes('lark') || ua.includes('feishu') || typeof window.tt !== 'undefined';
    }

    async function initJsapi() {
      try {
        const res = await fetch('/api/feishu/jsapi-signature', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: location.href.split('#')[0] }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.msg);

        window.tt.config({
          appId: data.appId,
          timestamp: Number(data.timestamp),
          nonceStr: data.nonceStr,
          signature: data.signature,
          jsApiList: ['login'],
        });

        return new Promise((resolve, reject) => {
          window.tt.ready(() => resolve());
          window.tt.error((err) => reject(new Error('JSAPI 初始化失败: ' + JSON.stringify(err))));
        });
      } catch (err) {
        throw new Error('JSAPI 签名获取失败: ' + err.message);
      }
    }

    async function handleLogin() {
      if (!isInFeishu()) {
        showStatus('error', '请在飞书客户端中打开此页面以使用免登录功能。\n在浏览器中无法调用飞书 JSAPI。');
        return;
      }

      setLoading(true);
      showStatus('info', '正在初始化飞书 JSAPI…');

      try {
        await initJsapi();
        showStatus('info', '正在获取登录授权…');

        window.tt.login({
          success: async function (loginRes) {
            try {
              showStatus('info', '正在验证身份…');
              const res = await fetch('/api/auth/feishu/auto-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: loginRes.code }),
              });
              const data = await res.json();

              if (!data.success) throw new Error(data.msg);

              localStorage.setItem('token', data.token);
              showStatus('success', '登录成功！欢迎回来，' + (data.user.name || '飞书用户'));
              showUser(data.user);
              loginBtn.style.display = 'none';
            } catch (err) {
              showStatus('error', '登录失败: ' + err.message);
            } finally {
              setLoading(false);
            }
          },
          fail: function (err) {
            showStatus('error', '飞书授权失败: ' + JSON.stringify(err));
            setLoading(false);
          },
        });
      } catch (err) {
        showStatus('error', err.message);
        setLoading(false);
      }
    }

    // Auto-login on page load inside Feishu
    window.addEventListener('DOMContentLoaded', () => {
      const existingToken = localStorage.getItem('token');
      if (existingToken) {
        fetch('/api/auth/me', {
          headers: { Authorization: 'Bearer ' + existingToken },
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.success && data.user) {
              showStatus('success', '已登录：' + (data.user.name || '飞书用户'));
              showUser(data.user);
              loginBtn.style.display = 'none';
            }
          })
          .catch(() => {});
      }

      if (isInFeishu() && !existingToken) {
        handleLogin();
      }
    });
  </script>
</body>
</html>
